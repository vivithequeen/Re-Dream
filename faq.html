<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="bob3.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, minimum-scale=1">
    <title>Re-Dream FAQ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="faq.css">
    <style>
        body {
            background: linear-gradient(to bottom, rgba(224, 213, 240, 1) 0%, rgba(224, 213, 240, 1) 30%, transparent 0%), url('bgg2.png');
            background-size: 30% auto, cover;
            background-position: top, center;
            background-attachment: scroll, scroll;
            background-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="header-content"></div>
    </header>

    <div class="content">
        <!-- Decorative Bobs -->
        <img src="bob1.png" alt="" class="bob-decoration bob-1a">
        <img src="bob2.png" alt="" class="bob-decoration bob-2a">
        <img src="bob3.png" alt="" class="bob-decoration bob-3a">

        <div class="back-btn-wrap reveal">
            <a href="index.html" class="back-btn"><img src="return_button.png" alt="Back to Re-Dream"></a>
        </div>

        <div class="faq-hero reveal">
            <img src="Faq_header.png" alt="FAQ">
        </div>

        <div class="faq-container">

            <!-- General -->
            <div class="faq-category reveal">
                <img src="Faq_general.png" alt="General" class="faq-category-img">
                <img src="Faq_4.png" alt="What is Re-Dream?" class="faq-item-img">
                <img src="Faq_1.png" alt="When does Re-Dream start?" class="faq-item-img">
                <img src="Faq_2.png" alt="Who can participate?" class="faq-item-img">
                <img src="Faq_3.png" alt="And all of this is free?" class="faq-item-img">
                <img src="Faq_5.png" alt="How do I track my time?" class="faq-item-img">
            </div>

            <!-- Projects -->
            <div class="faq-category reveal reveal-delay-1">
                <img src="Faq_projects.png" alt="Projects" class="faq-category-img">
                <img src="Faq_10.png" alt="What if I'm new to coding?" class="faq-item-img">
                <img src="Faq_9.png" alt="What can I make?" class="faq-item-img">
                <img src="Faq_8.png" alt="Can I make more than one project?" class="faq-item-img">
                <img src="Faq_7.png" alt="Can I submit an existing project?" class="faq-item-img">
                <img src="Faq_6.png" alt="Does my code have to be open source?" class="faq-item-img">
            </div>

            <!-- Other -->
            <div class="faq-category reveal reveal-delay-2">
                <img src="Faq_other.png" alt="Other" class="faq-category-img">
                <img src="Faq_11.png" alt="Can I use AI?" class="faq-item-img">
                <img src="Faq_12.png" alt="Can I submit to another hack club program?" class="faq-item-img">
                <img src="Faq_13.png" alt="Can I get involved or contribute?" class="faq-item-img">
            </div>

            <!-- Help Banner -->
            <div class="help-banner reveal">
                <img src="Help.png" alt="Still have questions? Reach out in #re-dream-help.">
            </div>

        </div>
    </div>

    <footer class="reveal">
        <p>Made by Skylar and Jordan with as much love as we're legally allowed to give :3</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
