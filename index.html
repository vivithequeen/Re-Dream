<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, minimum-scale=1">
    <title>Re-Dream</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(to bottom, rgba(224, 213, 240, 1) 0%, rgba(224, 213, 240, 1) 30%, transparent 0%), url('bgg2.png');
            background-size: 30% auto, cover;
            background-position: top, center;
            background-attachment: scroll, scroll;
            background-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="header-content"></div>
    </header>

    <div class="content">
        <img src="bob1.png" alt="" class="bob-decoration bob-1a">
        <img src="bob1.png" alt="" class="bob-decoration bob-1b">
        <img src="bob1.png" alt="" class="bob-decoration bob-1c">
        <img src="bob2.png" alt="" class="bob-decoration bob-2a">
        <img src="bob2.png" alt="" class="bob-decoration bob-2b">
        <img src="bob3.png" alt="" class="bob-decoration bob-3a">
        <img src="bob3.png" alt="" class="bob-decoration bob-3b">
        <img src="bob4.png" alt="" class="bob-decoration bob-4a">
        <img src="bob4.png" alt="" class="bob-decoration bob-4b">

        <section class="hero">
            <h2 class="hero-subtitle reveal reveal-delay-1">brought to you by Skylar, Jordan and [Sponsor]</h2>
            <img src="Logo.png" alt="Re-Dream" class="hero-logo reveal">
            <div class="button-group reveal reveal-delay-2">
                <a href="https://rsvp.soon.it/re-dream" class="img-btn rsvp-button" target="_blank" rel="noopener noreferrer"><img src="RSVP.png" alt="RSVP"></a>
                <a href="faq.html" class="img-btn faq-button"><img src="faq.png" alt="FAQ"></a>
            </div>
        </section>

        <section class="about-section reveal">
            <img src="hourMsg.png" alt="How does the budget work? Every 10 hours of code earns you 500 chips to spend on your project" class="about-message-img">
        </section>

        <section class="ship-section">
            <img src="Ship_message.png" alt="What can you ship? Any game at all!" class="ship-header-img reveal">
            <div class="cards-container reveal reveal-delay-2">
                <div class="card var-card">
                    <img src="var 1.png" alt="Variety 1" class="var-card-img">
                </div>
                <div class="card var-card">
                    <img src="var 4.png" alt="Variety 2" class="var-card-img">
                </div>
                <div class="card var-card">
                    <img src="var 3.png" alt="Variety 3" class="var-card-img">
                </div>
            </div>
        </section>

        <section class="chips-section">
            <img src="Budget_message.png" alt="Every 10 hour devlog you ship you get 500 chips added to your budget! You can use your chips to get things that will improve your game: artist commissions, libraries, tools, or even a Steam publishing key. It's simple: log hours, earn chips, then spend those chips making your dream game just as good as you've imagined!" class="budget-header-img reveal">

            <div class="chips-flow reveal reveal-delay-2">
                <img src="Log_10hrs.png" alt="Log 10 Hours - Submit a devlog every 10 hours" class="chips-step-img">
                <div class="chips-arrow"> </div>
                <img src="Earn_500.png" alt="Earn 500 Chips - Gets added to your budget after your devlog is approved" class="chips-step-img">
                <div class="chips-arrow"> </div>
                <img src="Apply_grants.png" alt="Apply for Grants - Spend chips on whatever you want for your project" class="chips-step-img">
            </div>

            <div class="grants-grid reveal reveal-delay-3">
                <img src="commission_art.png" alt="Commission Art - Get it looking just right" class="grant-img">
                <img src="Buy_libraries.png" alt="Buy Libraries - Makes your life a lot easier when coding" class="grant-img">
                <img src="Steam_publishing.png" alt="Steam Publishing - You can spend 1000 chips to publish your game on Steam" class="grant-img steam-img">
            </div>
        </section>

        <section class="stickers-section reveal">
            <img src="Stickers.png" alt="And Stickers! You won't receive anything until you ship your first 10 hour devlog, but after you do, not only will you get 500 chips, but you will also get an EXCLUSIVE STICKER SHEET!!" class="stickers-img">
        </section>

        <section class="demo-section reveal">
            <div class="demo-container">
                <div class="demo-text">
                    <img src="demo_message.png" alt="Check out the demo project! You could submit this!" class="demo-message-img">
                </div>
                <div class="demo-image">
                    <a href="https://bolb2019.itch.io/just-beats-and-dungeons" target="_blank" rel="noopener noreferrer"><img src="image.png" alt="Demo Game Project"></a>
                </div>
            </div>
        </section>

        <section class="cta">
            <div class="cta-wrapper reveal">
                <img src="CTA.png" alt="Call to Action" class="cta-image">
                <a href="https://rsvp.soon.it/re-dream" class="img-btn cta-rsvp-button" target="_blank" rel="noopener noreferrer"><img src="RSVP.png" alt="RSVP"></a>
            </div>
        </section>
    </div>

    <footer class="reveal">
        <p>Made by Skylar and Jordan with as much love as we're legally allowed to give :3</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
